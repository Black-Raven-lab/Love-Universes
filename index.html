<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Cosmic Love | A Galaxy Made For You</title>
    <meta
      name="description"
      content="Interactive cosmic galaxy with messages of love and affection 💖"
    />
    <meta property="og:title" content="Cosmic Love | A Galaxy Made For You" />
    <meta
      property="og:description"
      content="An interactive galaxy with words of love and devotion 💖"
    />
    <meta property="og:image" content="og-cover.png" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />

    <!-- Three.js and OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  </head>
  <body>
    <canvas id="galaxy-canvas"></canvas>

    <div class="container">
      <div class="header">
        <div class="pill">You Are The Most Beautiful Part Of My Universe</div>
      </div>

      <div class="footer">
        <div class="attribution">Created with ❤️ | PONG SEANGLY</div>
      </div>

      <!-- Floating Music Orb -->
      <div class="music-orb" id="musicOrb" title="Music">🎵</div>

      <!-- Playlist Drawer (Hidden by default) -->
      <div class="player hidden" id="player">
        <div class="playlist-header">🎵 Cosmic Music</div>

        <div class="playlist-items" id="playlistItems">
          <!-- Playlist items will be generated here -->
        </div>

        <button class="upload-btn" id="uploadBtn">📁 Add Music</button>
        <input type="file" id="pickFile" accept="audio/mp3" multiple />

        <div class="now-playing">
          🎶 Now Playing
          <div class="now-playing-title" id="nowPlayingTitle">
            Select a song
          </div>
        </div>

        <div class="player-controls">
          <button class="control-btn" id="prevBtn">⏮</button>
          <button class="control-btn" id="playBtn">⏯</button>
          <button class="control-btn" id="nextBtn">⏭</button>
        </div>
      </div>
    </div>

    <div id="tapMessage">Tap Anywhere To Begin 💖</div>
    <div id="err" class="error"></div>

    <canvas id="fx"></canvas>

    <script src="index.js"></script>
  </body>
</html>
